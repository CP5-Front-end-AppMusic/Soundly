<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Soundly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-purple-900 min-h-screen flex items-center justify-center">

  <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md">

    <!-- LOGO -->
    <h1 class="text-3xl font-bold text-center text-pink-500 mb-6">Soundly</h1>

    <!-- TÍTULO -->
    <h2 class="text-xl text-white text-center mb-6">Entre na sua conta</h2>

    <!-- FORM -->
    <form>

      <!-- EMAIL -->
      <div class="mb-4">
        <label class="text-gray-300 text-sm">Email</label>
        <input 
          type="email" 
          placeholder="seuemail@email.com"
          class="w-full mt-1 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
      </div>

      <!-- SENHA -->
      <div class="mb-6">
        <label class="text-gray-300 text-sm">Senha</label>
        <input 
          type="password" 
          placeholder="********"
          class="w-full mt-1 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
      </div>

      <button 
        class="w-full bg-pink-500 py-3 rounded-lg font-semibold hover:bg-pink-600 transition transform hover:scale-105"
      >
        Entrar
      </button>

    </form>

    <!-- LINKS -->
    <div class="text-center mt-6">
      <p class="text-gray-400 text-sm">
        Não tem conta?
        <a href="#" class="text-pink-400 hover:underline">Criar agora</a>
      </p>
    </div>

  </div>

</body>
</html>
