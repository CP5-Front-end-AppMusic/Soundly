<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodia - Criar Conta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-black text-white min-h-screen flex">

  <div class="hidden md:flex w-1/2 bg-gradient-to-br from-purple-900 via-pink-900 to-black flex-col justify-center items-center p-12">
    <h1 class="text-5xl font-bold mb-4">Melodia</h1>
    <p class="text-gray-400 text-center text-lg">Sua música, sua forma. Entre para a melhor experiência musical.</p>
  </div>

  <div class="w-full md:w-1/2 flex justify-center items-center p-8">
    <div class="w-full max-w-md">
      
      <a href="../../index.html" class="text-gray-400 hover:text-white mb-8 inline-block">← Voltar</a>

      <h1 class="text-3xl font-bold mb-2">Criar conta</h1>
      <p class="text-gray-400 mb-8">Preencha seus dados para começar</p>

      <form onsubmit="cadastrar(event)" class="space-y-5">
        
        <div>
          <label class="block text-sm text-gray-400 mb-2">Nome completo</label>
          <input type="text" id="nome" required placeholder="Seu nome" 
            class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-pink-500 transition">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">E-mail</label>
          <input type="email" id="email" required placeholder="seu@email.com" 
            class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-pink-500 transition">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">Senha</label>
          <input type="password" id="senha" required placeholder="Mínimo 6 caracteres" minlength="6"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-pink-500 transition">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">Confirmar senha</label>
          <input type="password" id="confirmar" required placeholder="Repita a senha"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-pink-500 transition">
        </div>

        <button type="submit" class="w-full bg-pink-500 py-3 rounded-full font-bold hover:bg-pink-600 transition mt-4">
          Criar conta
        </button>

      </form>

      <p class="text-center text-gray-400 mt-6">
        Já tem conta? <a href="login.html" class="text-pink-500 hover:underline">Entrar</a>
      </p>

    </div>
  </div>

  <script>
    function cadastrar(e) {
      e.preventDefault();
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;

      if (senha !== confirmar) {
        alert('As senhas não coincidem!');
        return;
      }

      const nome = document.getElementById('nome').value;
      localStorage.setItem('usuario', JSON.stringify({ nome, email: document.getElementById('email').value }));
      
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
