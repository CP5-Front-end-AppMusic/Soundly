<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - Soundly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-purple-900 min-h-screen flex items-center justify-center">

  <!-- CONTAINER -->
  <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-full max-w-md">

    <!-- VOLTAR -->
    <a href="login.html" class="text-gray-400 text-sm hover:text-white">← Voltar</a>

    <!-- LOGO -->
    <h1 class="text-3xl font-bold text-center text-pink-500 mt-2 mb-4">Soundly</h1>

    <!-- TÍTULO -->
    <h2 class="text-xl text-white text-center mb-6">Crie sua conta</h2>

    <!-- FORM -->
    <form onsubmit="return cadastrar(event)">

      <!-- NOME -->
      <div class="mb-4">
        <label class="text-gray-300 text-sm">Nome</label>
        <input 
          type="text" 
          placeholder="Seu nome"
          required
          class="w-full mt-1 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
      </div>

      <!-- EMAIL -->
      <div class="mb-4">
        <label class="text-gray-300 text-sm">Email</label>
        <input 
          type="email" 
          placeholder="seuemail@email.com"
          required
          class="w-full mt-1 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
      </div>

      <!-- SENHA -->
      <div class="mb-4">
        <label class="text-gray-300 text-sm">Senha</label>
        <input 
          type="password" 
          placeholder="********"
          required
          class="w-full mt-1 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
      </div>

      <!-- CONFIRMAR SENHA -->
      <div class="mb-6">
        <label class="text-gray-300 text-sm">Confirmar Senha</label>
        <input 
          type="password" 
          placeholder="********"
          required
          class="w-full mt-1 p-3 rounded-lg bg-white/20 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500"
        >
      </div>

      <!-- BOTÃO -->
      <button 
        class="w-full bg-pink-500 py-3 rounded-lg font-semibold hover:bg-pink-600 transition transform hover:scale-105"
      >
        Criar Conta
      </button>

    </form>

    <!-- LOGIN -->
    <div class="text-center mt-6">
      <p class="text-gray-400 text-sm">
        Já tem conta?
        <a href="login.html" class="text-pink-400 hover:underline">Entrar</a>
      </p>
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    function cadastrar(e) {
      e.preventDefault();
      alert("Conta criada com sucesso!");
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
